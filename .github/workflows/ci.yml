name: CI

on:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check src/worker.js
          node --check src/lib/db.js
          node --check src/lib/auth.js

      - name: Type check frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Worker smoke tests
        run: node --test tests/db.test.js tests/worker.test.js

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run
